# Floral Whispers Gifts — production Nginx configuration
# Deploy: sudo cp nginx/floralwhispersgifts.conf /etc/nginx/sites-available/floralwhispersgifts
#         sudo ln -sf /etc/nginx/sites-available/floralwhispersgifts /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name floralwhispersgifts.co.ke www.floralwhispersgifts.co.ke;
    return 301 https://www.$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.floralwhispersgifts.co.ke;

    ssl_certificate     /etc/letsencrypt/live/www.floralwhispersgifts.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.floralwhispersgifts.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        access_log off;
    }

    location /_next/image {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    location ~* ^/(favicon|robots\.txt|sitemap) {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "SAMEORIGIN"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    }

    client_max_body_size 10M;
}
